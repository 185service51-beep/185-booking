<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - 185Service Booking</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Admin specific styles */
    .admin-container {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }
    
    .admin-header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .filters-wrapper {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-select, .search-input {
      padding: 10px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      background: white;
    }

    .search-input {
      min-width: 200px;
    }

    /* Admin Login Card */
    .login-card {
      max-width: 400px;
      margin: 80px auto;
      text-align: center;
    }

    /* Data Table styling */
    .table-container {
      overflow-x: auto;
      background: var(--black-surface);
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
      border: 1px solid var(--black-border);
      margin-bottom: 20px;
    }

    .booking-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.95rem;
      color: var(--white);
    }

    .booking-table th, .booking-table td {
      padding: 16px 20px;
      border-bottom: 1px solid var(--black-border);
    }

    .booking-table th {
      background-color: var(--black-card);
      font-weight: 600;
      color: var(--gray);
    }

    .booking-table tr:hover {
      background-color: #2a2a2a;
    }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .badge-success {
      background-color: rgba(21, 128, 61, 0.2);
      color: #4ade80;
      border: 1px solid #15803d;
    }

    .badge-danger {
      background-color: rgba(185, 28, 28, 0.2);
      color: #f87171;
      border: 1px solid #b91c1c;
    }

    .badge-warning {
      background-color: rgba(217, 119, 6, 0.2);
      color: #fbbf24;
      border: 1px solid #d97706;
    }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 10, 0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--black-card);
      border: 1px solid var(--black-border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      color: var(--white);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--black-border);
      padding-bottom: 12px;
    }

    .modal-header h3 {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--white);
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--gray);
    }

    .close-btn:hover {
      color: var(--red);
    }

    .action-btn-group {
      display: flex;
      gap: 8px;
    }

    .btn-icon {
      padding: 8px;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-edit { background-color: var(--red); }
    .btn-edit:hover { background-color: var(--red-dark); }
    
    .nav-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .tab-link {
      padding: 10px 20px;
      background: var(--black-surface);
      border: 1px solid var(--black-border);
      border-radius: 8px;
      color: var(--white);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .tab-link:hover {
      background: var(--black-border);
    }
    
    .tab-link.active {
      background: var(--red);
      border-color: var(--red);
      color: white;
    }
    
    /* FullCalendar custom styling */
    .fc-theme-standard td, .fc-theme-standard th, .fc-theme-standard .fc-scrollgrid {
      border-color: #e2e8f0;
    }
    .fc .fc-button-primary {
      background-color: var(--red) !important;
      border-color: var(--red) !important;
    }
    .fc .fc-button-primary:not(:disabled).fc-button-active, .fc .fc-button-primary:not(:disabled):active {
      background-color: var(--red-dark) !important;
      border-color: var(--red-dark) !important;
    }
    .fc-event {
      cursor: pointer;
    }
  </style>
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
</head>
<body>
  <div class="background-decor">
    <div class="glow-circle primary-glow"></div>
    <div class="glow-circle secondary-glow"></div>
  </div>

  <div class="admin-container" id="adminContainer">
    <!-- Login Screen -->
    <div class="booking-card login-card" id="loginScreen">
      <header class="app-header">
        <div class="logo-container">
          <i class="fa-solid fa-lock logo-icon"></i>
          <h1>Admin <span>Login</span></h1>
        </div>
        <p class="subtitle">กรุณากรอกรหัสผ่านเพื่อเข้าสู่แผงควบคุม</p>
      </header>
      
      <form id="loginForm" onsubmit="handleLogin(event)" style="padding-top: 20px;">
        <div class="form-group">
          <input type="password" id="adminPin" placeholder="กรอกรหัสผ่าน..." required style="text-align: center; font-size: 1.2rem; letter-spacing: 4px;">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">
          เข้าสู่ระบบ <i class="fa-solid fa-right-to-bracket"></i>
        </button>
      </form>
    </div>

    <!-- Dashboard Screen (Hidden initially) -->
    <div class="hidden" id="dashboardScreen">
      <header class="app-header" style="text-align: left; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 20px; background: transparent;">
        <div>
          <div class="logo-container" style="justify-content: flex-start;">
            <i class="fa-solid fa-circle-user logo-icon"></i>
            <h1>Admin <span>Dashboard</span></h1>
          </div>
          <p class="subtitle">ระบบจัดการคิวบริการหลังบ้าน 185Service</p>
        </div>
        <div class="action-btn-group">
          <a href="index.html" class="btn btn-secondary" style="padding: 10px 16px; min-height: unset;"><i class="fa-solid fa-globe"></i> หน้าแรก</a>
          <button class="btn btn-primary" style="padding: 10px 16px; min-height: unset;" onclick="openAddModal()"><i class="fa-solid fa-plus"></i> เพิ่มคิว</button>
          <button class="btn btn-secondary" style="padding: 10px 16px; min-height: unset;" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ</button>
        </div>
      </header>

      <div class="booking-card" style="padding: 24px; margin-top: 24px; border-top: 1px solid var(--black-border); border-radius: var(--radius);">
        
        <div class="nav-tabs">
          <button class="tab-link active" id="btnTabList" onclick="switchView('list')"><i class="fa-solid fa-list"></i> ตารางคิว</button>
          <button class="tab-link" id="btnTabCalendar" onclick="switchView('calendar')"><i class="fa-solid fa-calendar-days"></i> ปฏิทินแบบเต็ม</button>
        </div>

        <!-- Toolbar controls -->
        <div class="admin-header-actions" id="listToolbar">
          <div class="filters-wrapper">
            <input type="text" id="searchInput" placeholder="ค้นหาชื่อ, เบอร์โทร, ทะเบียนรถ..." class="search-input" oninput="filterBookings()">
            
            <select id="branchFilter" class="filter-select" onchange="filterBookings()">
              <option value="">ทุกสาขา</option>
              <option value="สาย 3">สาขาสาย 3</option>
              <option value="บางแค">สาขาบางแค</option>
              <option value="นนทบุรี">สาขานนทบุรี</option>
              <option value="หนองแขม">สาขาหนองแขม</option>
            </select>

            <select id="statusFilter" class="filter-select" onchange="filterBookings()">
              <option value="">ทุกสถานะ</option>
              <option value="ปกติ">ปกติ (ใช้งาน)</option>
              <option value="ยกเลิก">ยกเลิก</option>
            </select>
          </div>
          <button class="btn btn-secondary" style="padding: 10px 16px; min-height: unset;" onclick="loadBookings()"><i class="fa-solid fa-rotate"></i> รีเฟรช</button>
        </div>

        <!-- List View -->
        <div class="table-container" id="listViewContainer">
          <table class="booking-table">
            <thead>
              <tr>
                <th>วันที่/เวลานัด</th>
                <th>สาขา</th>
                <th>ข้อมูลลูกค้า</th>
                <th>ข้อมูลรถยนต์</th>
                <th>รายละเอียดบริการ</th>
                <th>สถานะ</th>
                <th>จัดการ</th>
              </tr>
            </thead>
            <tbody id="bookingsTableBody">
              <!-- Bookings data injected here -->
            </tbody>
          </table>
        </div>

        <!-- Calendar View -->
        <div id="calendarViewContainer" class="hidden" style="background: white; border-radius: 12px; padding: 20px; color: black; min-height: 600px;">
          <div id="calendar"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- Edit/Add Modal -->
  <div class="modal" id="bookingModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">แก้ไขข้อมูลการจอง</h3>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <form id="modalForm" onsubmit="saveBooking(event)">
        <input type="hidden" id="modalBookingId">
        
        <div class="form-group">
          <label for="modalBranch">สาขาที่เข้ารับบริการ</label>
          <select id="modalBranch" required class="filter-select" style="width: 100%; height: 48px;">
            <option value="สาย 3">สาขาสาย 3</option>
            <option value="บางแค">สาขาบางแค</option>
            <option value="นนทบุรี">สาขานนทบุรี</option>
            <option value="หนองแขม">สาขาหนองแขม</option>
          </select>
        </div>

        <div class="form-grid-2">
          <div class="form-group">
            <label for="modalDate">วันที่นัดหมาย</label>
            <input type="date" id="modalDate" required>
          </div>
          <div class="form-group">
            <label for="modalTime">เวลานัดหมาย (08:30-14:00)</label>
            <select id="modalTime" required class="filter-select" style="width: 100%; height: 48px;">
              <option value="08:30">08:30 น.</option>
              <option value="09:30">09:30 น.</option>
              <option value="10:30">10:30 น.</option>
              <option value="11:30">11:30 น.</option>
              <option value="12:30">12:30 น.</option>
              <option value="13:30">13:30 น.</option>
            </select>
          </div>
        </div>

        <div class="form-grid-2">
          <div class="form-group">
            <label for="modalCustomerName">ชื่อลูกค้า</label>
            <input type="text" id="modalCustomerName" required>
          </div>
          <div class="form-group">
            <label for="modalCustomerPhone">เบอร์โทรศัพท์</label>
            <input type="text" id="modalCustomerPhone" required>
          </div>
        </div>

        <div class="form-grid-2">
          <div class="form-group">
            <label for="modalCarLicense">ทะเบียนรถ</label>
            <input type="text" id="modalCarLicense" required>
          </div>
          <div class="form-group">
            <label for="modalCarModel">ยี่ห้อ / รุ่นรถ</label>
            <input type="text" id="modalCarModel" required>
          </div>
        </div>

        <div class="form-group">
          <label for="modalServiceDetails">รายละเอียดบริการ</label>
          <textarea id="modalServiceDetails" rows="3"></textarea>
        </div>

        <div class="form-group" id="statusGroup">
          <label for="modalStatus">สถานะคิว</label>
          <select id="modalStatus" class="filter-select" style="width: 100%; height: 48px;">
            <option value="ปกติ">ปกติ (ใช้งาน)</option>
            <option value="ยกเลิก">ยกเลิกคิว (ลบออกจากปฏิทิน)</option>
          </select>
        </div>

        <div class="form-navigation" style="margin-top: 24px;">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">ยกเลิก</button>
          <button type="submit" class="btn btn-primary" id="btnModalSave">บันทึกข้อมูล</button>
        </div>
      </form>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
